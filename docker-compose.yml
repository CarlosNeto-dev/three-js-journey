services:
  sandbox:
    build: .
    ports:
      - "3001:3000"
    volumes:
      - ./sandbox:/app
    working_dir: /app
    container_name: three-js-sandbox
  
  studies:
    build: .
    ports:
      - "3002:3000"
    volumes:
      - ./studies:/app
    working_dir: /app
    container_name: three-js-studies
  
  projects:
    build: .
    ports:
      - "3003:3000"
    volumes:
      - ./projects:/app
    working_dir: /app
    container_name: three-js-projects
  
  alpine:
    build: .
    working_dir: /app
    volumes:
      - .:/app
    stdin_open: true
    tty: true
    container_name: alpine-terminal
    entrypoint: ["sh"]
